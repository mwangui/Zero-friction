<mat-card class="kpi-card" appearance="outlined">
  <mat-card-content>
    <div class="kpi-header">
      <mat-icon class="kpi-icon">{{ icon() }}</mat-icon>
      <span class="kpi-title">{{ title() }}</span>
    </div>
    <div class="kpi-value">
      {{ value() }}
      @if (unit()) {
        <span class="kpi-unit">{{ unit() }}</span>
      }
    </div>
    <div class="kpi-trend" [class]="'kpi-trend trend-' + trend()">
      <mat-icon class="trend-icon">{{ trendIcon() }}</mat-icon>
      <span>{{ trendLabel() }}</span>
    </div>
  </mat-card-content>
</mat-card>
